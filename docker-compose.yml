---
# =============================================================================
# EIEL Data Model Modernization Lab — Docker Compose
# =============================================================================
# Entorno demostrable para análisis, rediseño y validación del modelo de datos
# EIEL sobre PostgreSQL/PostGIS.
# =============================================================================

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: eiel-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eiel_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eiel_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-eiel_lab}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/migrations:/workspace/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data: